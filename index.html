<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style type="text/tailwindcss">
      @theme {
        --color-brand-bg: #000000;       /* Fondo negro puro */
        --color-brand-accent: #E6A355;   /* Nuevo color principal de marca */
        --color-brand-card: rgba(18, 18, 18, 0.85); /* Tarjetas oscuras elegantes */
        --color-brand-hover: rgba(35, 30, 22, 0.95); /* Hover cálido en tarjetas */
        --color-brand-border: rgba(230, 163, 85, 0.25); /* Bordes con tinte dorado */
      }

      /* Animación de subida y degradado de las cenizas */
      @keyframes ember-rise {
        0% {
          transform: translateY(0) scale(1);
          opacity: 0.8;
        }
        50% {
          opacity: 1;
        }
        100% {
          transform: translateY(-100vh) scale(0.2);
          opacity: 0;
        }
      }

      .ember {
        position: absolute;
        bottom: -10px;
        border-radius: 50%;
        pointer-events: none;
        animation: ember-rise linear infinite;
      }
    </style>
  </head>
  <body class="bg-black text-gray-100 min-h-screen flex flex-col justify-between p-6 font-sans relative overflow-x-hidden">

    <!-- CAPA 1: Imagen de Fondo Difuminada -->
    <div 
      class="absolute inset-0 w-full h-full bg-cover bg-center bg-no-repeat filter blur-xs scale-100 -z-20 opacity-80"
      style="background-image: url('/background.jpg');">
    </div>

    <!-- CAPA 2: Capa Oscura de Contraste para garantizar legibilidad -->
    <div class="absolute inset-0 bg-black/75 -z-10"></div>

    <!-- CAPA 3: Contenedor de Cenizas Flotantes -->
    <div id="embers-container" class="fixed inset-0 pointer-events-none z-0 overflow-hidden"></div>

    <!-- Contenedor Principal (Perfecto para móviles y centrado en escritorio) -->

      <div class="relative group">

          class="absolute -inset-0.5 bg-gradient-to-r from-brand-accent to-amber-700 rounded-full blur opacity-75 group-hover:opacity-100 transition duration-500">
        </div>
        <img class="relative rounded-full w-24 h-24 object-cover border-4 border-black"
          src="/logo.png"
          alt="Foto de perfil" />

      <!-- Nombre e Info del Perfil -->

        <i class="fa-solid fa-fire text-xs"></i> L-S:10am-3pm y 6pm-10pm
      </p>
      <p class="text-gray-300 text-sm mt-3 text-center px-4 max-w-sm leading-relaxed drop-shadow-md">
        Hamburguesas artesanales estilo americano, alitas ahumadas, salchis y más.
      </p>
  
      <!-- Bloque de Enlaces -->
      <div class="w-full space-y-4 mt-8">
  
        <!-- Enlace Destacado -->
        <a href="https://wa.me/51963877851?text=%C2%A1Quiero%20ordenar%21" target="_blank" rel="noopener noreferrer"
          class="flex items-center justify-center gap-3 w-full px-6 py-4 bg-brand-card backdrop-blur-md hover:bg-brand-hover border border-brand-border hover:border-brand-accent rounded-xl transition-all duration-300 transform hover:-translate-y-1 text-center font-medium hover:text-brand-accent">
          <i class="fa-brands fa-whatsapp text-brand-accent"></i> Haz tu pedido por delivery
        </a>
  
        <!-- Enlace Estándar 1 -->
        <a href="https://cdn.jsdelivr.net/gh/MeetDaan/linktree@main/menu.pdf" target="_blank" rel="noopener noreferrer"
          class="flex items-center justify-center gap-3 w-full px-6 py-4 bg-brand-card backdrop-blur-md hover:bg-brand-hover border border-brand-border hover:border-brand-accent rounded-xl transition-all duration-300 transform hover:-translate-y-1 text-center font-medium hover:text-brand-accent">
          <i class="fa-solid fa-burger text-brand-accent"></i> Nuestra carta digital
        </a>
  
        <!-- Enlace Estándar 2 -->
        <a href="https://maps.app.goo.gl/ccMWwHEi8xHeb8b67" target="_blank" rel="noopener noreferrer"
          class="flex items-center justify-center gap-3 w-full px-6 py-4 bg-brand-card backdrop-blur-md hover:bg-brand-hover border border-brand-border hover:border-brand-accent rounded-xl transition-all duration-300 transform hover:-translate-y-1 text-center font-medium hover:text-brand-accent">
          <i class="fa-solid fa-map-pin text-brand-accent"></i> ¿Cómo llegar?
        </a>
  
        <!-- Enlace Estándar 3 -->
        <a href="mailto:meetdaanburgers@gmail.com?subject=Consulta%20Meet%20Daan%20Burgers" target="_blank" rel="noopener noreferrer"
          class="flex items-center justify-center gap-3 w-full px-6 py-4 bg-brand-card backdrop-blur-md hover:bg-brand-hover border border-brand-border hover:border-brand-accent rounded-xl transition-all duration-300 transform hover:-translate-y-1 text-center font-medium hover:text-brand-accent">
          <i class="fa-solid fa-envelope text-brand-accent"></i> Escríbenos
        </a>
  
      </div>
  
      <!-- Iconos de Redes Sociales -->
      <div class="flex space-x-6 mt-10 text-gray-300 drop-shadow-sm text-2xl">
        <a href="https://www.facebook.com/110404261641816" class="hover:text-brand-accent transition-colors duration-200" title="Facebook">
          <i class="fa-brands fa-facebook"></i>
        </a>
        <a href="https://www.instagram.com/meetdaanburgers/" class="hover:text-brand-accent transition-colors duration-200" title="Instagram">

          <i class="fa-brands fa-tiktok"></i>

      </div>
  
    </main>
  
    <!-- Footer -->
    <footer class="text-center text-xs text-gray-500 pb-4 relative z-10">
      MeetDaan Burger House © 2026
    </footer>

    <!-- Script de Cenizas -->
    <script>
      const container = document.getElementById('embers-container');
      const emberCount = 40;

      // Colores ajustados a la paleta dorada/fuego de la marca (#E6A355)
      const colors = [
        '#E6A355', 
        '#d9822b', 
        '#ffb862', 
        '#ff4500', 
        '#737373'  // Tono ceniza
      ];

      for (let i = 0; i < emberCount; i++) {
        const ember = document.createElement('div');
        
        const size = Math.random() * 3 + 2; 
        const left = Math.random() * 100;
        const duration = Math.random() * 5 + 4;
        const delay = Math.random() * 6;
        const randomColor = colors[Math.floor(Math.random() * colors.length)];

        ember.className = 'ember';
        ember.style.width = `${size}px`;
        ember.style.height = `${size}px`;
        ember.style.left = `${left}%`;
        ember.style.backgroundColor = randomColor;
        ember.style.animationDuration = `${duration}s`;
        ember.style.animationDelay = `${delay}s`;
        
        // Brillo adaptado al color individual
        ember.style.boxShadow = `0 0 6px ${randomColor}`;

        container.appendChild(ember);
      }
    </script>
  </body>
</html>
